openapi: 3.0.1
info:
  title: MessageSender
  description: API Definition of MessageSender
  version: 1.0.0
servers:
- url: http://localhost:8290/messagesender
- url: https://localhost:8253/messagesender
paths:
  /send:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
                - content
              properties:
                body:
                  type: object
                  example: 
                    message: "Hello from ASB"
                    status: "active"
                content:
                  type: string
                  example: "application/json"
      responses:
        default:
          description: Default response
  /sendWithContentType:
    post:
      requestBody:
        description: Sample Payload
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
          application/xml:
            schema:
              type: object
              xml:
                name: payload
        required: false
      responses:
        default:
          description: Default response
  /sendPayload:
    post:
      requestBody:
        content:
          application/json:
            schema:
              required:
              - messagePayload
              type: object
              properties:
                messagePayload:
                  type: string
                  example: Hello payload
        required: true
      responses:
        default:
          description: Default response
  /schedule:
    post:
      requestBody:
        content:
          application/json:
            schema:
              required:
              - body
              - day
              - hour
              - minute
              - month
              - second
              - year
              type: object
              properties:
                body:
                  type: string
                  example: sample test body
                year:
                  type: string
                  example: "2026"
                month:
                  type: string
                  example: "04"
                day:
                  type: string
                  example: "26"
                hour:
                  type: string
                  example: "10"
                minute:
                  type: string
                  example: "30"
                second:
                  type: string
                  example: "00"
        required: true
      responses:
        default:
          description: "Returns {\"sequenceNumber\": <long>}"
  /cancel/{sequenceNumber}:
    get:
      parameters:
      - name: sequenceNumber
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        default:
          description: Default response
  /sendBatch:
    post:
      requestBody:
        content:
          application/json:
            schema:
              required:
              - batch
              - count
              type: object
              properties:
                count:
                  type: integer
                  example: 2
                batch:
                  type: array
                  example:
                  - body: Batch msg 1
                  - body: Batch msg 2
                  items:
                    type: object
                    properties:
                      body:
                        type: string
        required: true
      responses:
        default:
          description: Default response
  /close:
    get:
      responses:
        default:
          description: Closes the sender connection (requires server restart to reconnect)
